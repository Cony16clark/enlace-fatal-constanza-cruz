<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enlace Fatal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

/* SISTEMA DE VISTAS (PÁGINAS) */
.vista {
    display: none;
    min-height: 100vh;
}

.vista.activa {
    display: flex;
    flex-direction: column;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:80px 40px;
    position:relative;
}

/* TITULO */
h1{
    font-size:clamp(3rem,8vw,6rem);
    letter-spacing:10px;
    margin-top:80px;
    margin-bottom:150px;
}

/* Efecto individual por letra al pasar el cursor */
h1 span {
    display: inline-block;
    transition: .3s;
    cursor: default;
}

h1 span:hover{
    color:#7dffae;
    text-shadow:
    0 0 10px #7dffae,
    0 0 20px #7dffae,
    0 0 40px #7dffae;
    transform: translateY(-5px);
}

/* LOGO */
.logo{
    width:120px;
    margin-bottom:80px;
    animation:flotar 4s ease-in-out infinite;
}

/* DESCRIPCIÓN */
.descripcion{
    max-width:900px;
    font-size:1.4rem;
    line-height:1.8;
    color:#c8c8c8;
    margin-bottom:80px;
}

/* BOTON */
button{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:1rem;
    cursor:pointer;
    transition:.3s;
    background-color: white;
    color: black;
    font-weight: bold;
}

button:hover{
    transform:scale(1.05);
    background-color: #7dffae;
}

/* GALERIA INTERACTIVA COPIADA */
.galeria{
    display:none;
    padding:80px 10%;
    gap:40px;
    flex-wrap:wrap;
    justify-content:center;
    background: #050505;
}

.galeria.mostrar{
    display:flex;
}

.card{
    width:220px;
    transition:.4s;
    cursor: pointer;
}

.card img{
    width:100%;
    display:block;
}

.card:hover{
    transform:scale(1.08);
    filter:
    drop-shadow(0 0 8px #7dffae)
    drop-shadow(0 0 20px #7dffae);
}

/* FONDO DECORATIVO CONSERVADO */
.circuito{
    position:absolute;
    opacity:.15;
    width:100%;
    height:100%;
    pointer-events:none;
    top: 0;
    left: 0;
}

/* SECCIÓN RECTÁNGULOS */
.seccion-rectangulos{
    width:100%;
    padding:250px 20px 120px;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* COLUMNA VERTICAL */
.fila-rectangulos{
    display:flex;
    flex-direction:column;
    gap:60px;
    width:100%;
    max-width:900px;
    align-items:center;
}

/* RECTÁNGULOS GRANDES */
.rectangulo-contenedor{
    width:700px;
    max-width:90%;
    height:220px;
    border-radius:35px;
    display:flex;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
    transition:.4s;
}

.rectangulo-contenedor:hover{
    transform:scale(1.03);
}

/* COLORES */
.rec-morado{
    background-color:#c3b7d1;
}

.rec-azul{
    background-color:#0ea5e9;
}

.rec-verde{
    background-color:#a3e635;
}

.rec-coral{
    background-color:#f87171;
}

/* CONTENEDOR NEGRO INTERNO */
.rectangulo-negro-interno{
    background-color:#000;
    width:260px;
    height:100%;
    border-radius:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* IMÁGENES */
.rectangulo-negro-interno img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

/* VISTA DE DETALLE (PÁGINA SECUNDARIA SIMULADA) */
.vista-detalle {
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
}

.contenedor-detalle {
    max-width: 600px;
    background: #111;
    padding: 40px;
    border-radius: 20px;
    border: 1px solid #333;
}

.img-grande {
    width: 100%;
    max-height: 50vh;
    object-fit: contain;
    margin-bottom: 30px;
}

.btn-volver {
    margin-top: 20px;
}

/* ANIMACIONES */
@keyframes flotar{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-15px); }
    100%{ transform:translateY(0px); }
}

</style>
</head>

<body><div id="visorImagen" class="visor">
    <span onclick="cerrarImagen()">&times;</span>
    <img id="imagenGrande">
</div>

    <div id="pagina-principal" class="vista activa">
        
        <section class="hero">
            <svg class="circuito">
                <line x1="100" y1="100" x2="250" y2="100" stroke="white"/>
                <line x1="250" y1="100" x2="250" y2="200" stroke="white"/>
                <circle cx="250" cy="200" r="4" fill="white"/>
            </svg>

            <img src="logo-central.png" alt="Enlace Fatal" class="logo">

            <h1 id="titulo-interactivo">ENLACE FATAL</h1>

            <p class="descripcion">
                Este juego es un juego agonal que se basa en la competencia
                entre rivales. Su principal objetivo es derrotar al rival
                conectando y ramificando su estructura hasta el tronco rival
                y conquistarlo.
            </p>
            <div class="galeria-seis">

    <img src="galeria1.jpg" onclick="abrirImagen(this.src)">
    <img src="galeria2.jpg" onclick="abrirImagen(this.src)">
    <img src="galeria3.jpg" onclick="abrirImagen(this.src)">
    <img src="galeria4.jpg" onclick="abrirImagen(this.src)">
    <img src="galeria5.jpg" onclick="abrirImagen(this.src)">
    <img src="galeria6.jpg" onclick="abrirImagen(this.src)">

</div>

            <button onclick="mostrarGaleria()">
                Ver Componentes
            </button>
        </section>

        <section class="galeria" id="galeria">
            <div class="card" onclick="irAPaginaDetalle('pieza1.png', 'Componente: Pieza 1')">
                <img src="pieza1.png" alt="Pieza 1">
            </div>

            <div class="card" onclick="irAPaginaDetalle('pieza2.png', 'Componente: Pieza 2')">
                <img src="pieza2.png" alt="Pieza 2">
            </div>

            <div class="card" onclick="irAPaginaDetalle('pieza3.png', 'Componente: Pieza 3')">
                <img src="pieza3.png" alt="Pieza 3">
            </div>

            <div class="card" onclick="irAPaginaDetalle('pieza4.png', 'Componente: Pieza 4')">
                <img src="pieza4.png" alt="Pieza 4">
            </div>
        </section>

        <section class="seccion-rectangulos">
            <div class="fila-rectangulos">
                
                <div class="rectangulo-contenedor rec-morado">
                    <div class="rectangulo-negro-interno">
                        <img src="pieza1.png" alt="Pieza 1">
                    </div>
                </div>

                <div class="rectangulo-contenedor rec-azul">
                    <div class="rectangulo-negro-interno">
                        <img src="pieza2.png" alt="Pieza 2">
                    </div>
                </div>

                <div class="rectangulo-contenedor rec-verde">
                    <div class="rectangulo-negro-interno">
                        <img src="pieza3.png" alt="Pieza 3">
                    </div>
                </div>

                <div class="rectangulo-contenedor rec-coral">
                    <div class="rectangulo-negro-interno">
                        <img src="pieza4.png" alt="Pieza 4">
                    </div>
                </div>

            </div>
        </section>

    </div>

    <div id="pagina-detalle" class="vista">
        <section class="hero vista-detalle">
            
            <svg class="circuito">
                <line x1="100" y1="100" x2="250" y2="100" stroke="white"/>
                <line x1="250" y1="100" x2="250" y2="200" stroke="white"/>
                <circle cx="250" cy="200" r="4" fill="white"/>
            </svg>

            <div class="contenedor-detalle">
                <h2 id="detalle-titulo" style="margin-bottom: 20px; font-size: 2rem; letter-spacing: 2px;"></h2>
                <img id="detalle-img" class="img-grande" src="" alt="Vista previa del componente">
                <br>
                <button class="btn-volver" onclick="irAPaginaPrincipal()">
                    Volver a Enlace Fatal
                </button>
            </div>

        </section>
    </div>

<script>

// 1. DIVISIÓN DINÁMICA DE LETRAS PARA HOVER INDEPENDIENTE
const titulo = document.getElementById("titulo-interactivo");
const textoOriginal = titulo.innerText;
titulo.innerHTML = ""; 

textoOriginal.split("").forEach(letra => {
    const span = document.createElement("span");
    span.innerHTML = letra === " " ? "&nbsp;" : letra; 
    titulo.appendChild(span);
});


// 2. INTERRUPTOR DE GALERÍA
function mostrarGaleria(){
    const galeria = document.getElementById("galeria");
    galeria.classList.toggle("mostrar");
    
    if(galeria.classList.contains("mostrar")) {
        galeria.scrollIntoView({ behavior: 'smooth' });
    }
}


// 3. ENRUTAMIENTO DE VISTAS (Cambio y retorno de página)
function irAPaginaDetalle(rutaImagen, tituloPieza) {
    document.getElementById("pagina-principal").classList.remove("activa");
    document.getElementById("pagina-detalle").classList.add("activa");
    
    document.getElementById("detalle-img").src = rutaImagen;
    document.getElementById("detalle-titulo").innerText = tituloPieza;
    
    window.scrollTo(0, 0);
}

function irAPaginaPrincipal() {
    document.getElementById("pagina-detalle").classList.remove("activa");
    document.getElementById("pagina-principal").classList.add("activa");
    
    window.scrollTo(0, 0);
}

</script>

</body>
</html>
